name: Auto-bump SW cache version

on:
  push:
    branches: [main]
    paths-ignore:
      - 'sw.js'  # prevent infinite loop

permissions:
  contents: write          # <-- DAS fehlte: erlaubt dem Bot den Push

jobs:
  bump-sw-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump SW cache version
        run: |
          set -euo pipefail
          CURRENT=$(grep -oP "CACHE_VERSION = 'v\K[0-9]+\.[0-9]+" sw.js)
          if [ -z "$CURRENT" ]; then
            echo "CACHE_VERSION nicht in sw.js gefunden"; exit 1
          fi
          echo "Current: v$CURRENT"
          NEW=$(awk "BEGIN { printf \"%.1f\", $CURRENT + 0.1 }")
          echo "New: v$NEW"
          sed -i "s/CACHE_VERSION = 'v$CURRENT'/CACHE_VERSION = 'v$NEW'/" sw.js

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --staged --quiet || git commit -m "chore: auto-bump SW cache version"
          git push
